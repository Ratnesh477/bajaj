<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL API Tester</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e0f2fe, #ede9fe);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 24px;
    }

    h2 {
      margin: 0 0 8px;
      color: #1e293b;
    }

    p {
      margin: 0 0 16px;
      color: #64748b;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px;
      resize: vertical;
      font-size: 14px;
      outline: none;
      transition: border 0.2s ease;
    }

    textarea:focus {
      border-color: #6366f1;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      background: #4f46e5;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #4338ca;
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      font-size: 13px;
      color: #475569;
    }

    pre {
      margin-top: 16px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      min-height: 80px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>BFHL API Tester</h2>
    <p>Enter node connections in JSON format and submit to your API.</p>

    <textarea id="input">["A->B","A->C","B->D"]</textarea>

    <div class="actions">
      <button onclick="send()">Submit</button>
      <span class="status" id="status"></span>
    </div>

    <pre id="output">Response will appear here...</pre>
  </div>

  <script>
    async function send() {
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");

      try {
        statusEl.textContent = "Sending request...";
        outputEl.textContent = "";

        const data = JSON.parse(document.getElementById("input").value);

        const res = await fetch("http://localhost:3000/bfhl", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data })
        });

        const json = await res.json();
        outputEl.textContent = JSON.stringify(json, null, 2);
        statusEl.textContent = "Success";
      } catch (err) {
        statusEl.textContent = "Error";
        outputEl.textContent = "Invalid JSON or server error:\n" + err.message;
      }
    }
  </script>
</body>
</html>
